#
# ansible playbook to bootstrap kubernetes onto a new Ubuntu 20.04 server
# and deploy sinfonia-tier2
#
# run as: ansible-playbook deploy.yml -i $host,
#
# Optionally set the SINFONIA_TIER1_URL environment variable if you
# want to register with a sinfonia-tier1 instance.
#  i.e. SINFONIA_TIER1_URL=https://cloudlet.mydomain.org
---
- hosts: localhost
  become: false
  gather_facts: false
  no_log: true

  tasks:
  - name: make sure local directory for deployment files exists
    ansible.builtin.file:
      path: "files"
      state: directory

  - name: update local copy of deployment files
    ansible.builtin.command:
      cmd: poetry run poe update-deployment-files
      creates: "files/kilo-wg-exporter.yaml"

- hosts: localhost
  remote_user: ubuntu
  become_user: root
  become: true

  vars:
    sinfonia_tier1_url: "https://localhost:5000"
    #sinfonia_recipes: "https://storage.cmusatyalab.org/sinfonia-recipes/"
    sinfonia_recipes: ""
    carbonedge_tier2_electricity_maps_auth_token: "NchuMpRvQR95S"
    carbonedge_tier2_carbon_intensity_query_mode: "REALTIME"

    # sinfonia_tier2_url: "{{ hostvars[inventory_hostname].sinfonia_tier2_url }}"
    # carbonedge_tier2_latitude: "{{ hostvars[inventory_hostname].carbonedge_tier2_latitude }}"
    # carbonedge_tier2_longitude: "{{ hostvars[inventory_hostname].carbonedge_tier2_longitude }}"

    # sinfonia_tier2_url: "{{ hostvars[inventory_hostname].sinfonia_tier2_url }}"
    carbonedge_tier2_latitude: "42.3757"
    carbonedge_tier2_longitude: "-72.5199"

    enable_ufw: false
    override_resolv_conf: true

  #environment:
  #  K8S_AUTH_KUBECONFIG: /etc/rancher/k3s/k3s.yaml

  tasks:
  - import_tasks: tasks/ubuntu.yml
  - import_tasks: tasks/k3s.yml
  - import_tasks: tasks/kube-prometheus-stack.yml
  - import_tasks: tasks/kilo.yml
  - import_tasks: tasks/nvidia_gpu_operator.yml
  # - import_tasks: tasks/kubevirt.yml

  #- name: configure storage...

  - name: deploy sinfonia-tier2
    kubernetes.core.k8s:
      kubeconfig: /etc/rancher/k3s/k3s.yaml
      state: present
      resource_definition:
        apiVersion: helm.cattle.io/v1
        kind: HelmChart
        metadata:
          name: sinfonia-tier2
          namespace: kube-system
        spec:
          chart: sinfonia
          repo: https://k2nt.github.io/helm/carbonedge
          targetNamespace: default
          valuesContent: |-
            sinfoniaTier1Url: "{{ sinfonia_tier1_url }}"
            sinfoniaTier2Url: "http://localhost:5001"
            sinfoniaRecipes: "{{ sinfonia_recipes }}"
            carbonedgeTier2Latitude: "{{ carbonedge_tier2_latitude }}"
            carbonedgeTier2Longitude: "{{ carbonedge_tier2_longitude }}"
            ingress:
              className: traefik
            image:
              repository: k2nt/carbonedge
              tag: dev2
